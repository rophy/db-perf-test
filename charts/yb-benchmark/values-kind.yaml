# Kind: single-node cluster for quick e2e testing
# No nodeSelector (everything on one node), minimal resources

fullnameOverride: ""

# Sysbench configuration
sysbench:
  enabled: true
  image:
    repository: docker.io/rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  replicas: 1

  # Database connection
  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  # Benchmark parameters
  tables: 10
  tableSize: 100000
  threads: 4
  time: 120
  warmupTime: 30
  reportInterval: 10
  workload: oltp_insert

  # YugabyteDB-specific flags
  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  # Workload tuning flags (CRITICAL: rangeSelects=false prevents 100x slowdown)
  rangeSelects: false
  pointSelects: 2
  indexUpdates: 20
  nonIndexUpdates: 20
  numRowsInInsert: 1
  threadInitTimeout: 90

# Prometheus configuration
prometheus:
  enabled: true
  image:
    repository: docker.io/prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  retention: 7d

# k6 with xk6-sql
k6:
  enabled: true
  image:
    repository: ghcr.io/rophy/containers/k6-sql
    tag: 20260422-69b5ee6
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  replicas: 1
  tables: 10
  tableSize: 100000
  createSecondary: true
  installTrigger: true
  serialCacheSize: 1000
  vus: 4
  warmupTime: 30
  duration: "120s"
  db:
    host: yb-tserver-service
    port: "5433"
    user: yugabyte
    password: yugabyte
    name: yugabyte

# Node exporter
nodeExporter:
  enabled: true
  image:
    repository: docker.io/prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

# prom-replay: VictoriaMetrics + MinIO + Grafana + Replay Manager
prom-replay:
  enabled: true
  replayManager:
    image:
      repository: null-ptr-exception/prom-replay/replay-manager
      tag: "20260425-2fdf082"
  victoriametrics:
    retentionPeriod: "30d"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    scrapeConfig:
      global:
        scrape_interval: 5s
      scrape_configs:
        - job_name: victoriametrics
          static_configs:
            - targets: ["localhost:8428"]
        - job_name: cadvisor
          scheme: https
          tls_config:
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          metrics_path: /metrics/cadvisor
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        - job_name: node-exporter
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - source_labels: [__address__]
              regex: (.+):(.+)
              target_label: __address__
              replacement: ${1}:9100
        - job_name: yb-tserver
          metrics_path: /prometheus-metrics
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - yugabyte-test
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: yb-tserver
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: ${1}:9000
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
        - job_name: yb-master
          metrics_path: /prometheus-metrics
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - yugabyte-test
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: yb-master
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: ${1}:7000
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
  minio:
    persistence:
      size: 5Gi
    resources:
      requests:
        memory: 256Mi
  grafana:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    extraVolumes:
      - name: yb-tserver-dashboard
        configMap:
          name: yb-benchmark-yb-tserver
    extraVolumeMounts:
      - name: yb-tserver-dashboard
        mountPath: /var/lib/grafana/dashboards/yb-tserver.json
        subPath: yb-tserver.json
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Viewer
