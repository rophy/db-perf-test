# Kind: single-node cluster for quick e2e testing
# No nodeSelector (everything on one node), minimal resources

fullnameOverride: ""

# Sysbench configuration
sysbench:
  enabled: true
  image:
    repository: docker.io/rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  replicas: 1

  # Database connection
  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  # Benchmark parameters
  tables: 10
  tableSize: 100000
  threads: 4
  time: 120
  warmupTime: 30
  reportInterval: 10
  workload: oltp_insert

  # YugabyteDB-specific flags
  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  # Workload tuning flags (CRITICAL: rangeSelects=false prevents 100x slowdown)
  rangeSelects: false
  pointSelects: 2
  indexUpdates: 20
  nonIndexUpdates: 20
  numRowsInInsert: 1
  threadInitTimeout: 90

# Prometheus configuration
prometheus:
  enabled: true
  image:
    repository: docker.io/prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  retention: 7d

# k6 with xk6-sql
k6:
  enabled: true
  image:
    repository: ghcr.io/rophy/containers/k6-sql
    tag: 20260422-69b5ee6
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  replicas: 1
  tables: 10
  tableSize: 100000
  createSecondary: true
  installTrigger: true
  serialCacheSize: 1000
  vus: 4
  warmupTime: 30
  duration: "120s"
  db:
    host: yb-tserver-service
    port: "5433"
    user: yugabyte
    password: yugabyte
    name: yugabyte

# Node exporter
nodeExporter:
  enabled: true
  image:
    repository: docker.io/prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"
