# Minikube multi-node values - horizontal scalability testing
# Node layout: 1 master node (role=master) + 3 db nodes (role=db)
# All nodes: 4 CPUs / 8 GB RAM each

fullnameOverride: ""

# Sysbench configuration
sysbench:
  enabled: true
  image:
    repository: rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  nodeSelector:
    role: master

  # Database connection
  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  replicas: 1

  # Benchmark parameters
  tables: 10
  tableSize: 100000
  threads: 24
  time: 120
  warmupTime: 30
  reportInterval: 10
  workload: oltp_read_write

  # YugabyteDB-specific flags
  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  # Workload tuning flags (CRITICAL: rangeSelects=false prevents 100x slowdown)
  rangeSelects: false
  pointSelects: 10
  indexUpdates: 10
  nonIndexUpdates: 10
  numRowsInInsert: 10
  threadInitTimeout: 90

# Prometheus configuration
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  retention: 7d
  nodeSelector:
    role: master

# Node exporter - host-level CPU/memory/disk metrics
nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"
