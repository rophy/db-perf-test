      }

      if (INSTALL_TRIGGER) {
        db.exec(`
          CREATE OR REPLACE FUNCTION cleanup_duplicate_k()
          RETURNS TRIGGER AS $t$
          DECLARE
              old_id INTEGER;
          BEGIN
