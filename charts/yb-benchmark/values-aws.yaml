# AWS k3s values — multi-sysbench support.
# Node layout (kube-sandbox two-role model):
#   - role=db (tainted dedicated=db:NoSchedule): tserver nodes — 1 tserver per node
#   - role=system: system nodes — yb-masters (anti-affinity spread) + sysbench pods (1 per node)
# Single AZ. Auto-tablet-split stays DISABLED (iter 21 finding).

fullnameOverride: ""

# Sysbench — oltp_insert with cleanup_duplicate_k trigger, same as k3s-virsh baseline
sysbench:
  enabled: true
  image:
    repository: rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      memory: "24Gi"
  nodeSelector:
    role: system
  # Prefer a system node that isn't running a yb-master, so sysbench doesn't
  # steal CPU from the master during the run. With 4 system nodes + 3 masters,
  # the 4th node is the natural home for sysbench.
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/component
            operator: In
            values:
            - sysbench
        topologyKey: kubernetes.io/hostname
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - yb-master
          topologyKey: kubernetes.io/hostname

  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  replicas: 1

  tables: 24
  tableSize: 100000
  threads: 21000
  time: 300
  warmupTime: 90
  reportInterval: 10
  workload: oltp_insert

  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  rangeSelects: false
  pointSelects: 2
  indexUpdates: 20
  nonIndexUpdates: 20
  numRowsInInsert: 10
  threadInitTimeout: 300

# k6 with xk6-sql — custom schema/SQL load testing (disabled by default)
k6:
  enabled: false
  image:
    repository: ghcr.io/rophy/containers/k6-sql
    tag: 20260422-cd04e04
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      memory: "24Gi"
  replicas: 1
  nodeSelector:
    role: system
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/component
            operator: In
            values:
            - k6
        topologyKey: kubernetes.io/hostname
  db:
    host: yb-tserver-service
    port: "5433"
    user: yugabyte
    password: yugabyte
    name: yugabyte

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  retention: 7d
  nodeSelector:
    role: system

nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
