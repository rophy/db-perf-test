# AWS k3s values — multi-sysbench support.
# Node layout (kube-sandbox two-role model):
#   - role=db (tainted dedicated=db:NoSchedule): tserver nodes — 1 tserver per node
#   - role=system: system nodes — yb-masters (anti-affinity spread) + sysbench pods (1 per node)
# Single AZ. Auto-tablet-split stays DISABLED (iter 21 finding).

fullnameOverride: ""

# Sysbench — oltp_insert with cleanup_duplicate_k trigger, same as k3s-virsh baseline
sysbench:
  enabled: true
  image:
    repository: docker.io/rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      memory: "24Gi"
  nodeSelector:
    role: system
  # Prefer a system node that isn't running a yb-master, so sysbench doesn't
  # steal CPU from the master during the run. With 4 system nodes + 3 masters,
  # the 4th node is the natural home for sysbench.
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/component
            operator: In
            values:
            - sysbench
        topologyKey: kubernetes.io/hostname
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - yb-master
          topologyKey: kubernetes.io/hostname

  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  replicas: 1

  tables: 24
  tableSize: 100000
  threads: 21000
  time: 300
  warmupTime: 90
  reportInterval: 10
  workload: oltp_insert

  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  rangeSelects: false
  pointSelects: 2
  indexUpdates: 20
  nonIndexUpdates: 20
  numRowsInInsert: 10
  threadInitTimeout: 300

# k6 with xk6-sql — custom schema/SQL load testing (disabled by default)
k6:
  enabled: false
  image:
    repository: ghcr.io/rophy/containers/k6-sql
    tag: 20260422-69b5ee6
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      memory: "24Gi"
  replicas: 1
  nodeSelector:
    role: system
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/component
            operator: In
            values:
            - k6
        topologyKey: kubernetes.io/hostname
  tables: 24
  tableSize: 100000
  createSecondary: true
  installTrigger: true
  vus: 4
  warmupTime: 90
  duration: "300s"
  db:
    host: yb-tserver-service
    port: "5433"
    user: yugabyte
    password: yugabyte
    name: yugabyte

nodeExporter:
  enabled: true
  image:
    repository: docker.io/prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# prom-replay: VictoriaMetrics + MinIO + Grafana + Replay Manager
prom-replay:
  enabled: true
  replayManager:
    image:
      repository: null-ptr-exception/prom-replay/replay-manager
      tag: "20260425-2fdf082"
  victoriametrics:
    retentionPeriod: "30d"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    nodeSelector:
      role: system
    scrapeConfig:
      global:
        scrape_interval: 5s
      scrape_configs:
        - job_name: victoriametrics
          static_configs:
            - targets: ["localhost:8428"]
        - job_name: cadvisor
          scheme: https
          tls_config:
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          metrics_path: /metrics/cadvisor
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        - job_name: node-exporter
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - source_labels: [__address__]
              regex: (.+):(.+)
              target_label: __address__
              replacement: ${1}:9100
        - job_name: yb-tserver
          metrics_path: /prometheus-metrics
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - yugabyte-test
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: yb-tserver
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: ${1}:9000
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
        - job_name: yb-master
          metrics_path: /prometheus-metrics
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - yugabyte-test
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: yb-master
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: ${1}:7000
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
  minio:
    persistence:
      size: 10Gi
    resources:
      requests:
        memory: 256Mi
    nodeSelector:
      role: system
  grafana:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    extraVolumes:
      - name: yb-tserver-dashboard
        configMap:
          name: yb-benchmark-yb-tserver
    extraVolumeMounts:
      - name: yb-tserver-dashboard
        mountPath: /var/lib/grafana/dashboards/yb-tserver.json
        subPath: yb-tserver.json
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Viewer
