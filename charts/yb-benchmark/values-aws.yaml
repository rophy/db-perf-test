# AWS k3s values — iter 22: 14× c7i.16xlarge scale-up (64 vCPU/tserver) targeting ~140K TPS.
# Node layout (kube-sandbox two-role model):
#   - role=db (tainted dedicated=db:NoSchedule): 14× c7i.16xlarge (64 vCPU / 128 GB) — 1 tserver per node
#   - role=system: 4× c7i.4xlarge (16 vCPU / 32 GB) — 3 for yb-masters (anti-affinity spread) + 1 for sysbench
# Single AZ. Auto-tablet-split stays DISABLED (iter 21 finding).
# gflags mirror iter 21. Scale-up test: 2× vCPU per tserver + 14 tservers (vs 12× c7i.8xlarge baseline).

fullnameOverride: ""

# Sysbench — oltp_insert with cleanup_duplicate_k trigger, same as k3s-virsh baseline
sysbench:
  enabled: true
  image:
    repository: rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      cpu: null
      memory: "24Gi"
  nodeSelector:
    role: system
  # Prefer a system node that isn't running a yb-master, so sysbench doesn't
  # steal CPU from the master during the run. With 4 system nodes + 3 masters,
  # the 4th node is the natural home for sysbench.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - yb-master
          topologyKey: kubernetes.io/hostname

  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  tables: 24
  tableSize: 100000
  threads: 12000
  time: 300
  warmupTime: 90  # iter-4 matched
  reportInterval: 10
  workload: oltp_insert

  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  rangeSelects: false
  pointSelects: 2
  indexUpdates: 20
  nonIndexUpdates: 20
  numRowsInInsert: 10
  threadInitTimeout: 300

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  retention: 7d
  nodeSelector:
    role: system

nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# YugabyteDB — 3 masters on role=system, 14 tservers on role=db (RF=3)
yugabyte:
  enabled: true
  Image:
    tag: 2025.2.2.1-b1
  replicas:
    master: 3
    tserver: 14
  resource:
    master:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: null
        memory: null
    tserver:
      requests:
        cpu: "16"
        memory: "32Gi"
      limits:
        cpu: null
        memory: null
  storage:
    master:
      size: 10Gi
      storageClass: ebs-gp3
    tserver:
      count: 1
      size: 200Gi
      storageClass: ebs-gp3-db
  gflags:
    master:
      replication_factor: 3
      enable_automatic_tablet_splitting: false
    tserver:
      yb_num_shards_per_tserver: 2
      ysql_num_shards_per_tserver: 2
      bytes_durable_wal_write_mb: 4
      interval_durable_wal_write_ms: 10000
      ysql_max_connections: 1500
      enable_automatic_tablet_splitting: false
  enableLoadBalancer: false
  ysql:
    enabled: true
    port: 5433
  ycql:
    enabled: false
  metrics:
    enabled: true
  # Pin masters to system nodes; spread across them via anti-affinity (preferred,
  # so it still schedules if only 1 system node is Ready briefly).
  master:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
              - system
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - yb-master
            topologyKey: kubernetes.io/hostname
  # Pin tservers to db nodes, one per node, tolerate db taint
  tserver:
    tolerations:
      - key: dedicated
        operator: Equal
        value: db
        effect: NoSchedule
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
              - db
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - yb-tserver
          topologyKey: kubernetes.io/hostname
