# AWS k3s values — iter 19 re-run of iter 12 config (12 tservers + trigger).
# Node layout:
#   - role=db (tainted dedicated=db:NoSchedule): 12× c7i.8xlarge (Intel Sapphire Rapids) — 1 tserver per node
#   - role=client: 1× c7i.8xlarge (Intel Sapphire Rapids) — sysbench
#   - role=system: 1× c6i.2xlarge (Intel Ice Lake) — 3 yb-masters + prometheus
# CPU note: ap-east-2 does not offer c6a; c6i.8xlarge hit InsufficientInstanceCapacity.
# Using c7i.8xlarge (Sapphire Rapids, 32 vCPU / 64 GB). Record in EXPERIMENT_LABEL.txt per run.
# gflags intentionally mirror values-k3s-virsh.yaml (no RocksDB re-tuning).

fullnameOverride: ""

# Sysbench — oltp_insert with cleanup_duplicate_k trigger, same as k3s-virsh baseline
sysbench:
  enabled: true
  image:
    repository: rophy/sysbench
    tag: yugabyte-20260119
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "4"
      memory: "4Gi"
    limits:
      cpu: "28"
      memory: "16Gi"
  nodeSelector:
    role: client

  db:
    host: yb-tserver-service
    port: 5433
    user: yugabyte
    password: yugabyte
    name: yugabyte

  tables: 24
  tableSize: 100000
  threads: 6000  # iter-12 matched (12 tservers)
  time: 300
  warmupTime: 90  # iter-4 matched
  reportInterval: 10
  workload: oltp_insert

  rangeKeyPartitioning: false
  serialCacheSize: 1000
  createSecondary: true

  rangeSelects: false
  pointSelects: 2
  indexUpdates: 20
  nonIndexUpdates: 20
  numRowsInInsert: 10
  threadInitTimeout: 120

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.48.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  retention: 7d
  nodeSelector:
    role: system

nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# YugabyteDB — 3 masters on role=system, 12 tservers on role=db (RF=3)
yugabyte:
  enabled: true
  Image:
    tag: 2025.2.2.1-b1
  replicas:
    master: 3
    tserver: 12
  resource:
    master:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    tserver:
      requests:
        cpu: "16"
        memory: "32Gi"
      limits:
        cpu: null
        memory: null
  storage:
    master:
      size: 10Gi
      storageClass: ebs-gp3
    tserver:
      count: 1
      size: 200Gi
      storageClass: ebs-gp3-db
  gflags:
    master:
      replication_factor: 3
    tserver:
      yb_num_shards_per_tserver: 2
      ysql_num_shards_per_tserver: 2
      bytes_durable_wal_write_mb: 4
      interval_durable_wal_write_ms: 10000
      ysql_max_connections: 1024
  enableLoadBalancer: false
  ysql:
    enabled: true
    port: 5433
  ycql:
    enabled: false
  metrics:
    enabled: true
  # Pin masters to the system node
  master:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
              - system
  # Pin tservers to db nodes, one per node, tolerate db taint
  tserver:
    tolerations:
      - key: dedicated
        operator: Equal
        value: db
        effect: NoSchedule
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
              - db
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - yb-tserver
          topologyKey: kubernetes.io/hostname
