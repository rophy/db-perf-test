# Minikube: 3 masters + 3 tservers, RF=3
# Nodes: 4 CPUs / 8 GB RAM each

Image:
  tag: 2025.2.2.1-b1
replicas:
  master: 3
  tserver: 3
resource:
  master:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  tserver:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: null
      memory: null
storage:
  master:
    size: 5Gi
  tserver:
    size: 10Gi
gflags:
  master:
    replication_factor: 3
  tserver:
    yb_num_shards_per_tserver: 2
    ysql_num_shards_per_tserver: 2
enableLoadBalancer: false
ysql:
  enabled: true
  port: 5433
ycql:
  enabled: false
metrics:
  enabled: true
# Pin masters to master node
master:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: In
            values:
            - master
# Pin tservers to db nodes, one per node
tserver:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: In
            values:
            - db
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - yb-tserver
        topologyKey: kubernetes.io/hostname
