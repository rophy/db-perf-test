# AWS: 3 masters on role=system, tservers on role=db (RF=3)
# Single AZ. Auto-tablet-split OFF.

Image:
  tag: 2025.2.2.1-b1
replicas:
  master: 3
  tserver: 57
resource:
  master:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: null
      memory: null
  tserver:
    requests:
      cpu: "8"
      memory: "16Gi"
    limits:
      cpu: null
      memory: null
storage:
  master:
    size: 10Gi
    storageClass: ebs-gp3
  tserver:
    count: 1
    size: 200Gi
    storageClass: ebs-gp3-db
gflags:
  master:
    replication_factor: 3
    enable_automatic_tablet_splitting: false
    transaction_table_num_tablets: 171
  tserver:
    yb_num_shards_per_tserver: 2
    ysql_num_shards_per_tserver: 2
    bytes_durable_wal_write_mb: 4
    interval_durable_wal_write_ms: 10000
    ysql_max_connections: 1000
    enable_automatic_tablet_splitting: false
enableLoadBalancer: false
ysql:
  enabled: true
  port: 5433
ycql:
  enabled: false
metrics:
  enabled: true
# Pin masters to system nodes; spread via anti-affinity
master:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: In
            values:
            - system
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - yb-master
          topologyKey: kubernetes.io/hostname
# Pin tservers to db nodes, one per node, tolerate db taint
tserver:
  tolerations:
    - key: dedicated
      operator: Equal
      value: db
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: In
            values:
            - db
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - yb-tserver
        topologyKey: kubernetes.io/hostname
