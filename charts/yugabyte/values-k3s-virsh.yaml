# k3s-virsh: 3 masters + 3 tservers, RF=3
# VMs: 4 CPUs / 8 GB RAM each

Image:
  tag: 2025.2.2.1-b1
replicas:
  master: 3
  tserver: 3
resource:
  master:
    requests:
      cpu: "0.25"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
  tserver:
    requests:
      cpu: "0.5"
      memory: "2Gi"
    limits:
      cpu: null
      memory: null
storage:
  master:
    size: 5Gi
  tserver:
    count: 1
    size: 10Gi
    storageClass: local-storage
gflags:
  master:
    replication_factor: 3
  tserver:
    yb_num_shards_per_tserver: 2
    ysql_num_shards_per_tserver: 2
    bytes_durable_wal_write_mb: 4
    interval_durable_wal_write_ms: 10000
    global_memstore_size_percentage: 25
    rocksdb_max_background_compactions: 1
enableLoadBalancer: false
ysql:
  enabled: true
  port: 5433
ycql:
  enabled: false
metrics:
  enabled: true
# Pin masters to control node
master:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: In
            values:
            - master
# Pin tservers to db nodes, one per node
tserver:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: role
            operator: In
            values:
            - db
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - yb-tserver
        topologyKey: kubernetes.io/hostname
