# Kind: single-node cluster for quick e2e testing
# 1 master + 1 tserver, minimal resources, no affinity

Image:
  tag: 2025.2.2.1-b1
replicas:
  master: 1
  tserver: 1
resource:
  master:
    requests:
      cpu: "0.2"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  tserver:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: null
      memory: null
storage:
  master:
    size: 5Gi
  tserver:
    size: 10Gi
gflags:
  master:
    replication_factor: 1
  tserver:
    yb_num_shards_per_tserver: 2
    ysql_num_shards_per_tserver: 2
enableLoadBalancer: false
ysql:
  enabled: true
  port: 5433
ycql:
  enabled: false
metrics:
  enabled: true
