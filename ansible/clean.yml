- name: Stop tservers
  hosts: yb_tservers
  tasks:
    - name: Stop yb-tserver
      systemd:
        name: yb-tserver
        state: stopped
      become: yes
      ignore_errors: yes

- name: Stop masters
  hosts: control
  tasks:
    - name: Stop yb-master instances
      systemd:
        name: "yb-master-{{ item }}"
        state: stopped
      become: yes
      loop: [1, 2, 3]
      ignore_errors: yes

- name: Stop Prometheus
  hosts: control
  tasks:
    - name: Stop prometheus
      systemd:
        name: prometheus
        state: stopped
      become: yes
      ignore_errors: yes

- name: Wipe data (optional, pass -e wipe_data=true)
  hosts: yb
  tasks:
    - name: Remove YB data directory
      file:
        path: "{{ yb_data_dir }}"
        state: absent
      become: yes
      when: wipe_data | default(false) | bool
