- name: Create data directory for each master instance
  file:
    path: "{{ yb_data_dir }}/master-{{ idx + 1 }}"
    state: directory
    owner: ubuntu
  become: yes
  loop: "{{ yb_masters }}"
  loop_control:
    index_var: idx

- name: Install yb-master systemd units
  template:
    src: yb-master.service.j2
    dest: "/etc/systemd/system/yb-master-{{ idx + 1 }}.service"
  become: yes
  loop: "{{ yb_masters }}"
  loop_control:
    index_var: idx
  notify: restart yb-masters

- name: Start yb-master instances
  systemd:
    name: "yb-master-{{ idx + 1 }}"
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes
  loop: "{{ yb_masters }}"
  loop_control:
    index_var: idx
