- name: Pull YB shipper image
  containers.podman.podman_image:
    name: "{{ yb_shipper_image }}"
    state: present

- name: Check if YB already extracted
  stat:
    path: "{{ yb_install_dir }}/yugabyte-{{ yb_version }}/bin/yb-master"
  register: yb_installed

- name: Extract YB tarball
  when: not yb_installed.stat.exists
  block:
    - name: Remove stale extract container
      command: podman rm -f yb-extract
      failed_when: false
      changed_when: false

    - name: Create temp container from shipper image
      command: podman create --name yb-extract --entrypoint /bin/true {{ yb_shipper_image }}

    - name: Copy tarball out of container
      command: podman cp yb-extract:/tarball/yugabyte.tar.gz /tmp/yugabyte.tar.gz

    - name: Remove temp container
      command: podman rm yb-extract

    - name: Create install directory
      file:
        path: "{{ yb_install_dir }}"
        state: directory
      become: yes

    - name: Extract tarball
      unarchive:
        src: /tmp/yugabyte.tar.gz
        dest: "{{ yb_install_dir }}/"
        remote_src: yes
      become: yes

    - name: Run post_install.sh
      command: "{{ yb_install_dir }}/yugabyte-{{ yb_version }}/bin/post_install.sh"
      become: yes

    - name: Cleanup tarball
      file:
        path: /tmp/yugabyte.tar.gz
        state: absent
