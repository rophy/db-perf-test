- name: Pull k6 image
  containers.podman.podman_image:
    name: "{{ k6_image }}"
    state: present

- name: Check if k6 installed
  stat:
    path: /opt/bin/k6
  register: k6_installed

- name: Create /opt/bin
  file:
    path: /opt/bin
    state: directory
  become: yes

- name: Extract k6 binary
  when: not k6_installed.stat.exists
  block:
    - name: Remove stale container
      command: podman rm -f k6-extract
      failed_when: false
      changed_when: false

    - name: Create temp container
      command: podman create --name k6-extract {{ k6_image }}

    - name: Copy k6 binary to tmp
      command: podman cp k6-extract:/usr/local/bin/k6 /tmp/k6

    - name: Remove temp container
      command: podman rm k6-extract

    - name: Move k6 to /opt/bin
      command: mv /tmp/k6 /opt/bin/k6
      become: yes

- name: Make k6 executable
  file:
    path: /opt/bin/k6
    mode: "0755"
  become: yes

- name: Create bench directory
  file:
    path: /opt/bench/k6
    state: directory
  become: yes

- name: Deploy k6 test script
  template:
    src: test-pgx.js.j2
    dest: /opt/bench/k6/test.js
  become: yes

- name: Deploy k6 env file
  template:
    src: env.sh.j2
    dest: /opt/bench/k6/env.sh
    mode: "0755"
  become: yes
