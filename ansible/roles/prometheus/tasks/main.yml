- name: Pull prometheus image
  containers.podman.podman_image:
    name: "{{ prometheus_image }}"
    state: present

- name: Check if prometheus installed
  stat:
    path: /opt/bin/prometheus
  register: prom_installed

- name: Create /opt/bin
  file:
    path: /opt/bin
    state: directory
  become: yes

- name: Extract prometheus binary
  when: not prom_installed.stat.exists
  block:
    - name: Remove stale container
      command: podman rm -f prom-extract
      failed_when: false
      changed_when: false

    - name: Create temp container
      command: podman create --name prom-extract {{ prometheus_image }}

    - name: Copy prometheus binary to tmp
      command: podman cp prom-extract:/bin/prometheus /tmp/prometheus

    - name: Copy promtool binary to tmp
      command: podman cp prom-extract:/bin/promtool /tmp/promtool

    - name: Remove temp container
      command: podman rm prom-extract

    - name: Move binaries to /opt/bin
      command: mv /tmp/{{ item }} /opt/bin/{{ item }}
      become: yes
      loop:
        - prometheus
        - promtool

- name: Make binaries executable
  file:
    path: "/opt/bin/{{ item }}"
    mode: "0755"
  become: yes
  loop:
    - prometheus
    - promtool

- name: Create prometheus config directory
  file:
    path: /etc/prometheus
    state: directory
  become: yes

- name: Create prometheus data directory
  file:
    path: /var/lib/prometheus
    state: directory
    owner: ubuntu
  become: yes

- name: Install prometheus config
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
  become: yes
  notify: restart prometheus

- name: Install systemd unit
  copy:
    dest: /etc/systemd/system/prometheus.service
    content: |
      [Unit]
      Description=Prometheus
      After=network.target
      [Service]
      Type=simple
      User=ubuntu
      ExecStart=/opt/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus \
        --storage.tsdb.retention.time=7d \
        --web.enable-remote-write-receiver
      Restart=on-failure
      [Install]
      WantedBy=multi-user.target
  become: yes

- name: Start prometheus
  systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes
